<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для Сезим 💖</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation:fade 2s;
}

h1{
    color:#ff4d6d;
}

button{
    background:#ff4d6d;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    background:#ff1e4d;
}

.surprise{
    display:none;
    margin-top:20px;
    font-size:18px;
    color:#444;
}

.medal{
    font-size:50px;
    margin-top:15px;
}

@keyframes fade{
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}

/* сердечки */
.heart{
    position:absolute;
    color:red;
    font-size:20px;
    animation:fall 6s linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-10vh);
        opacity:1;
    }
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>💖 Сезим 💖</h1>

    <p>
        Ты самая красивая девушка на свете ✨ <br>
        Твоя улыбка делает мой день лучше ☀️ <br>
        Ты умная, добрая и невероятная 💫
    </p>

    <button onclick="showSurprise()">Нажми на сюрприз 🎁</button>

    <div class="surprise" id="surprise">
        <p>
        🏆 Награждается: <br>
        <b>СЕЗИМ</b>  
        </p>

        <p>
        За:  
        ❤️ самую красивую улыбку  
        ❤️ самое доброе сердце  
        ❤️ за то, что ты делаешь мир лучше
        </p>

        <div class="medal">🥇</div>

        <p>
        Я очень ценю тебя и рад что ты есть в моей жизни 💖
        </p>
    </div>
</div>

<script>
function showSurprise(){
    document.getElementById("surprise").style.display="block";
}

/* падающие сердечки */
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=Math.random()*20+15+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
